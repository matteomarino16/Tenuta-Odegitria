    <meta property="og:type" content="website">
    <meta property="og:locale" content="it_IT">
    <meta property="og:image" content="foto-home/hero.png">
    <meta property="og:image:alt" content="Galleria fotografica Tenuta Odegitria">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Galleria | Tenuta Odegitria">
    <meta name="twitter:description" content="Foto della Tenuta Odegitria: trulli, piscina, natura e spazi eventi a Martina Franca, nel cuore della Valle d’Itria.">
    <meta name="twitter:image" content="foto-home/hero.png">
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px 0;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            height: 300px;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        .gallery-item:hover img {
            transform: scale(1.05);
        }
        .gallery-hero {
            height: 40vh;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('foto-home/hero.png');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            text-align: center;
        }
        .gallery-hero h1 {
            font-size: 4rem;
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">
                    <a href="index.html">
                        <img src="foto-home/logo-tenuta-odegitria.png" alt="Tenuta Odegitria Logo">
                    </a>
                </div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#tenuta">La Tenuta</a></li>
                    <li><a href="index.html#trulli">I Trulli</a></li>
                    <li><a href="index.html#eventi">Eventi</a></li>
                    <li><a href="galleria.html" class="active">Galleria</a></li>
                    <li><a href="index.html#contatti">Contatti</a></li>
                </ul>
                <div class="burger">
                    <div class="line1"></div>
                    <div class="line2"></div>
                    <div class="line3"></div>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section class="gallery-hero">
            <h1>Galleria Fotografica</h1>
        </section>

        <section class="section">
            <div class="container">
                <div class="section-header">
                    <h2>La Nostra Tenuta</h2>
                    <p>Scatti suggestivi della nostra struttura e della natura circostante</p>
                    <div class="underline"></div>
                </div>
                
                <div class="gallery-grid">
                    <div class="gallery-item">
                        <img src="SLIDE-2.jpg" alt="Vista Tenuta">
                    </div>
                    <div class="gallery-item">
                        <img src="tenuta-odegitria-bed-and-breakfast-martina-franca-valle-ditria-1_20240131112758.jpg" alt="Trulli Interno">
                    </div>
                    <div class="gallery-item">
                        <img src="tenuta-odegitria-bed-and-breakfast-martina-franca-valle-ditria-24_20240131112751.jpg" alt="Dettaglio Trulli">
                    </div>
                    <div class="gallery-item">
                        <img src="foto-home/img_9236_20170227172510.jpg" alt="Paesaggio Valle d'Itria">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <a href="index.html">
                        <img src="foto-home/logo-tenuta-odegitria.png" alt="Tenuta Odegitria Logo">
                    </a>
                </div>
                <p>&copy; 2026 Tenuta Odegitria SRLS. Tutti i diritti riservati. P.IVA 12345678901</p>
                <a class="footer-credit" href="https://www.instagram.com/_matteomarino/" target="_blank" rel="noopener noreferrer">web by matteo marino</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
